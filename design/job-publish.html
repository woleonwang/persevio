    /* Base */
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: var(--color-bg-page);
      color: var(--color-text-main);
      font-family: var(--font-main);
      font-size: 14px;
      line-height: 1.5;
    }

    html.fonts-loading body {
      opacity: 0;
    }

    html.fonts-ready body {
      opacity: 1;
      transition: opacity 80ms ease;
    }

    button,
    input {
      font: inherit;
    }

    button {
      padding: 0;
      border: 0;
      outline: none;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }

    svg {
      display: block;
    }

    /* Layout */
    .page-shell {
      position: relative;
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: var(--color-bg-page);
    }

    .page-shell.is-sidebar-collapsed {
      --sidebar-width: 62px;
    }

    .page-shell.is-sidebar-collapsed .sidebar {
      padding: 24px 0 8px;
      align-items: center;
      background: var(--color-bg-page);
      border-right: 0;
    }

    .page-shell.is-sidebar-collapsed .brand,
    .page-shell.is-sidebar-collapsed .sidebar > nav,
    .page-shell.is-sidebar-collapsed .job-section,
    .page-shell.is-sidebar-collapsed .settings {
      display: none;
    }

    .page-shell.is-sidebar-collapsed .sidebar-rail {
      display: block;
    }

    .page-shell.is-sidebar-collapsed .assistant-scene {
      top: clamp(220px, calc(50vh - 229px + var(--assistant-desktop-y-offset)), 360px);
    }

    .workspace {
      position: relative;
      height: calc(100vh - 16px);
      min-height: 720px;
      margin: 8px 8px 8px 0;
      overflow: visible;
      border: 1px solid var(--color-bg-soft);
      border-radius: var(--radius-xl);
      background: var(--color-bg-card);
    }

    /* Sidebar */
    .sidebar {
      position: relative;
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 0;
      padding: 26px 12px 8px;
      background: var(--color-bg-page);
      transition: transform 180ms ease, width 180ms ease;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 40px;
      margin: 0 0 20px 8px;
    }
    .brand-logo {
      display: block;
      width: 150px;
      height: 40px;
      flex: 0 0 auto;
      background: var(--asset-logo) left center / 150px 40px no-repeat;
    }

    .page-shell.is-sidebar-collapsed .brand-logo {
      width: 38px;
      background-size: 150px 40px;
      background-position: left center;
    }

    .collapse-button {
      display: grid;
      width: 24px;
      height: 24px;
      margin-right: 2px;
      place-items: center;
      color: var(--color-text-tertiary);
      border-radius: var(--radius-sm);
    }

    .collapse-button:hover {
      background: var(--color-bg-hover);
    }

    .sidebar-rail {
      display: none;
      position: relative;
      z-index: 1;
      width: 62px;
      min-height: 100%;
    }

    .rail-button {
      position: absolute;
      left: 50%;
      display: grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border-radius: var(--radius-md);
      color: var(--color-text-main);
      transform: translateX(-50%);
    }

    .rail-button[data-rail-page="publish"] {
      top: 68px;
    }

    .rail-button[data-rail-page="company"] {
      top: 111px;
    }

    .rail-button[data-rail-page="candidates"] {
      top: 154px;
    }

    .rail-button[data-rail-page="account"] {
      top: 197px;
    }

    .rail-button[data-rail-page="org"] {
      top: 240px;
    }

    .rail-button:hover,
    .rail-button:focus-visible {
      background: var(--color-bg-hover);
    }

    .rail-button.is-primary {
      top: 0;
      width: 40px;
      height: 40px;
      border: 1px solid var(--color-border-light);
      border-radius: 10px;
      background: var(--color-bg-card);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .rail-button.is-settings {
      bottom: 0;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: var(--color-bg-card);
    }

    .page-shell.is-sidebar-collapsed .rail-button:hover,
    .page-shell.is-sidebar-collapsed .rail-button:focus-visible {
      background: var(--color-bg-hover);
    }

    .rail-button.is-rail-active::before {
      content: "";
      position: absolute;
      left: -15px;
      top: 50%;
      width: 4px;
      height: 20px;
      border-radius: 0 6px 6px 0;
      background: var(--color-sidebar-indicator);
      transform: translateY(-50%);
    }

    .rail-button svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      stroke-width: 2.25;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .rail-button .figma-icon {
      width: 20px;
      height: 20px;
      background-size: 20px 20px;
    }

    .rail-button.is-primary .figma-icon {
      width: 18px;
      height: 18px;
      background-size: 18px 18px;
    }

    .rail-tooltip {
      position: absolute;
      left: 46px;
      top: 50%;
      z-index: 5;
      display: none;
      height: 24px;
      padding: 0 8px;
      align-items: center;
      border-radius: 6px;
      background: #666666;
      color: #FFFFFF;
      font-family: "PingFang SC", "PingFang HK", var(--font-main);
      font-size: 12px;
      font-weight: 400;
      line-height: 24px;
      white-space: nowrap;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .page-shell.is-sidebar-collapsed .rail-button:hover .rail-tooltip,
    .page-shell.is-sidebar-collapsed .rail-button:focus-visible .rail-tooltip {
      display: flex;
    }

    .nav-list,
    .job-list,
    .context-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .nav-list li:first-child {
      margin-bottom: 0;
    }

    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      width: 256px;
      height: 42px;
      padding: 0 10px;
      gap: 8px;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      color: var(--color-text-main);
      font-size: 14px;
      font-weight: 400;
      line-height: 22px;
      letter-spacing: 0.28px;
      text-align: left;
    }

    .nav-item[data-page="publish"] {
      border-color: var(--color-border-light);
      background: var(--color-bg-card);
    }

    .nav-item.is-muted-active {
      background: var(--color-bg-selected);
    }
    .nav-item:hover,
    .nav-item:focus-visible {
      z-index: 1;
      font-weight: 400;
    }

    .nav-item:hover:not(.is-active),
    .nav-item:focus-visible:not(.is-active) {
      background: var(--color-bg-hover);
    }

    .nav-item[data-page="publish"]:hover:not(.is-active),
    .nav-item[data-page="publish"]:focus-visible:not(.is-active) {
      border-color: var(--color-border-light);
      background: var(--color-bg-card);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    }

    .nav-item.is-active::before,
    .nav-item.is-muted-active::before {
      content: "";
      position: absolute;
      left: -12px;
      top: 11px;
      width: 4px;
      height: 20px;
      background: var(--asset-nav-active-indicator) center / 4px 20px no-repeat;
    }

    .nav-item.is-active {
      border: 1px solid var(--color-border-light);
      background: var(--color-bg-card);
      font-weight: 400;
    }

    .nav-item.is-muted-active,
    .nav-item.is-muted-active:hover,
    .nav-item.is-active:hover,
    .nav-item.is-active:focus-visible {
      font-weight: 400;
    }

    .nav-item.is-active:hover,
    .nav-item.is-active:focus-visible {
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    }

    .nav-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      color: currentColor;
      background-size: 20px 20px;
    }

    .figma-icon {
      display: block;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
    }

    .icon-publish { background-image: var(--icon-publish); }
    .icon-company { background-image: var(--icon-company); }
    .icon-candidates { background-image: var(--icon-candidates); }
    .icon-account { background-image: var(--icon-account); }
    .icon-org { background-image: var(--icon-org); }
    .icon-search { background-image: var(--icon-search); }
    .icon-settings { background-image: var(--icon-settings); }
    .icon-collapse { background-image: var(--icon-collapse); }
    .icon-mic { background-image: var(--icon-mic); }
    .icon-send { background-image: var(--icon-send); }
    .icon-more { background-image: var(--icon-more); }

    .collapse-button .figma-icon {
      width: 18px;
      height: 18px;
    }

    .search-button .figma-icon {
      width: 13.266px;
      height: 13.266px;
    }

    .more-button .figma-icon {
      width: 12px;
      height: 2.667px;
    }

    .composer-action .mic-icon {
      width: 13.333px;
      height: 17.5px;
    }

    .composer-action .send-icon {
      width: 16.934px;
      height: 16.934px;
    }

    .job-section {
      position: relative;
      display: flex;
      flex: 1 1 auto;
      flex-direction: column;
      min-height: 0;
      margin-top: 22px;
    }

    .job-section.is-focused::before {
      content: "";
      position: absolute;
      left: -12px;
      top: 6px;
      width: 4px;
      height: 20px;
      border-radius: 0 6px 6px 0;
      background: var(--color-sidebar-indicator);
    }

    .job-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 256px;
      height: 32px;
      padding: 0 8px 0 10px;
      border-radius: var(--radius-md);
      font-weight: 600;
      line-height: 22px;
      letter-spacing: 0.28px;
      cursor: pointer;
    }

    .job-header:hover {
      background: var(--color-job-row-hover);
    }

    .job-section.is-focused .job-header {
      background: var(--color-bg-hover);
    }

    .job-section.is-job-selected .job-header {
      background: var(--color-job-row-selected);
    }

    .search-button {
      display: grid;
      width: 16px;
      height: 16px;
      place-items: center;
      color: var(--color-text-secondary);
    }

    .job-search-input {
      display: none;
      width: 256px;
      height: 36px;
      margin-top: 2px;
      padding: 0 10px;
      border: 1px solid var(--color-border-light);
      border-radius: 10px;
      outline: none;
      background: var(--color-bg-card);
      color: var(--color-text-main);
      font-size: 12px;
      font-weight: 400;
      line-height: 18px;
      letter-spacing: 0;
    }

    .job-search-input::placeholder {
      color: var(--color-text-placeholder);
      font-weight: 400;
    }

    .job-section.is-search-open .job-search-input {
      display: block;
    }

    .job-list-wrap {
      position: relative;
      margin-top: 2px;
      flex: 0 0 auto;
      height: calc(100vh - 425px);
      min-height: 360px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;
      padding-right: 9px;
    }

    .job-section.is-search-open .job-list-wrap {
      height: calc(100vh - 463px);
    }

    .job-list-wrap::-webkit-scrollbar {
      display: none;
      width: 0;
    }

    .job-section::after {
      content: "";
      position: absolute;
      z-index: 2;
      left: 0;
      right: -12px;
      bottom: 42px;
      height: 76px;
      pointer-events: none;
      background: linear-gradient(
        180deg,
        rgba(249, 249, 249, 0) 0%,
        rgba(249, 249, 249, 0.82) 66%,
        rgba(249, 249, 249, 1) 100%
      );
    }

    .job-list {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 256px;
      padding-left: 10px;
      padding-bottom: 20px;
    }

    .job-scrollbar-control {
      position: absolute;
      top: 39px;
      right: -12px;
      display: none;
      width: 10px;
      height: 0;
    }

    .job-section.has-scroll .job-scrollbar-control {
      display: block;
    }

    .job-scrollbar-thumb {
      position: absolute;
      left: 3.5px;
      top: 0;
      width: 3px;
      min-height: 44px;
      border-radius: 12px;
      background: #D9D9D9;
      cursor: grab;
    }

    .job-scrollbar-thumb:active {
      cursor: grabbing;
    }

    .job-row {
      position: relative;
      width: 256px;
      min-height: 32px;
      margin-left: -10px;
      padding: 5px 42px 5px 10px;
      border-radius: 10px;
      color: var(--color-text-secondary);
      font-size: 14px;
      font-weight: 400;
      line-height: 22px;
      letter-spacing: 0.28px;
    }

    .job-button {
      width: 100%;
      color: inherit;
      line-height: 22px;
      text-align: left;
    }

    .job-button:hover {
      color: var(--color-text-secondary);
      font-weight: 400;
    }

    .job-row:hover:not(.is-selected) {
      background: var(--color-job-row-hover);
    }

    .job-row:hover .job-button {
      position: relative;
      z-index: 1;
    }

    .job-row.is-selected {
      background: var(--color-job-row-selected);
    }

    .job-row.is-selected .job-button {
      position: relative;
      z-index: 1;
      font-weight: 400;
    }

    .job-row:hover .more-button,
    .job-row.is-selected .more-button {
      display: flex;
    }

    .more-button {
      position: absolute;
      z-index: 1;
      top: 50%;
      right: 8px;
      display: none;
      width: 24px;
      height: 24px;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      background: #FFFFFF;
      color: var(--color-text-main);
      transform: translateY(-50%);
    }

    .page-shell.is-menu-open .job-row.is-selected .more-button {
      display: flex;
    }

    .settings {
      position: absolute;
      z-index: 4;
      left: 12px;
      right: 12px;
      bottom: 8px;
      margin-top: 0;
    }

    .settings::before {
      content: "";
      position: absolute;
      z-index: 0;
      left: -12px;
      right: -12px;
      top: -8px;
      bottom: -2px;
      background: var(--color-bg-page);
      pointer-events: none;
    }

    .settings .nav-item {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      width: 100%;
      height: 42px;
      border: 1px solid transparent;
      background: var(--color-bg-card);
      border-radius: var(--radius-lg);
      font-weight: 400;
    }

    .settings .nav-item:hover,
    .settings .nav-item:focus-visible {
      border-color: var(--color-border-light);
      background: var(--color-bg-card);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
      font-weight: 400;
    }

    .settings .nav-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      align-self: center;
      background-size: 20px 20px;
    }

    .settings .nav-item span:last-child {
      display: inline-flex;
      align-items: center;
      height: 20px;
      line-height: 20px;
    }

    .mobile-sidebar-mask {
      display: none;
    }

    .mobile-menu-button {
      display: none;
    }

    /* Main assistant scene */
    .assistant-scene {
      position: absolute;
      left: calc(50% + var(--assistant-desktop-x-offset));
      top: calc(208px + var(--assistant-desktop-y-offset));
      width: min(770px, calc(100% - 48px));
      height: 458px;
      transform: translateX(-50%);
    }

    .profile {
      position: absolute;
      left: 0;
      top: 0;
      display: grid;
      grid-template-columns: 149px auto;
      align-items: start;
      width: 233px;
      height: 144px;
    }

    .profile-copy {
      margin-top: 55px;
      transform: none;
    }

    .avatar {
      position: relative;
      width: 144px;
      height: 144px;
      transform: none;
      transform-origin: left top;
    }

    .avatar-ring {
      position: absolute;
      left: 0;
      top: 0;
      width: 144px;
      height: 144px;
      background-image: var(--asset-avatar-bg);
      background-size: 144px 144px;
      background-repeat: no-repeat;
    }

    .avatar-circle {
      position: absolute;
      left: 22px;
      top: 29px;
      width: 100px;
      height: 100px;
      overflow: hidden;
      border-radius: 50%;
      background: #FFFFFF;
    }

    .avatar-person {
      position: absolute;
      left: 15px;
      top: 10px;
      width: 70px;
      height: 124px;
      background-image: var(--asset-avatar-person);
      background-size: 70px auto;
      background-repeat: no-repeat;
      background-position: center top;
    }

    .profile-name {
      margin: 0;
      color: var(--color-text-main);
      font-size: 20px;
      font-weight: 700;
      line-height: 30px;
    }

    .profile-role {
      margin: 0;
      color: var(--color-text-tertiary);
      font-size: 14px;
      font-weight: 400;
      line-height: 21px;
    }

    .prompt {
      position: absolute;
      left: 24px;
      top: 156px;
      width: calc(100% - 48px);
      margin: 0;
      color: var(--color-text-main);
      font-size: 24px;
      font-weight: 400;
      line-height: 40px;
    }

    .prompt p {
      margin: 0;
    }

    .prompt strong {
      color: var(--color-primary);
      font-weight: 600;
    }

    .prompt .typewriter-char {
      opacity: 1;
      transition: opacity 40ms linear;
    }

    .prompt p.is-typing .typewriter-char {
      opacity: 0;
    }

    .prompt p.is-typing .typewriter-char.is-visible {
      opacity: 1;
    }

    .typewriter-caret {
      display: inline-block;
      width: 2px;
      height: 0.92em;
      margin-left: 3px;
      background: var(--color-primary);
      vertical-align: -0.08em;
      animation: typewriterCaretBlink 1320ms ease-in-out infinite;
    }

    @keyframes typewriterCaretBlink {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .prompt .typewriter-char {
        opacity: 1 !important;
        transition: none;
      }

      .typewriter-caret {
        display: none;
      }
    }

    .prompt-divider {
      position: absolute;
      left: 24px;
      top: 256px;
      width: calc(100% - 48px);
      height: 1px;
      background: var(--color-border-light);
    }

    .suggestions {
      position: absolute;
      left: 24px;
      top: 278px;
      width: calc(100% - 48px);
    }

    .suggestions-label {
      margin: 0 0 12px;
      color: var(--color-text-tertiary);
      font-size: 16px;
      font-weight: 400;
      line-height: 24px;
    }

    .suggestion-list {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .suggestion-chip {
      display: inline-flex;
      height: 40px;
      padding: 0 20px;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      background: var(--color-bg-soft);
      color: var(--color-text-secondary);
      font-size: 16px;
      font-weight: 400;
      line-height: 24px;
      white-space: nowrap;
    }

    .suggestion-chip:hover,
    .suggestion-chip:focus-visible {
      background: var(--color-bg-hover);
      font-weight: 400;
    }

    .suggestion-chip:active {
      background: var(--color-border-light);
    }

    /* Input Composer */
    .composer {
      position: absolute;
      left: 0;
      top: 398px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 60px;
      padding: 4px 10px 4px 24px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-pill);
      background: var(--color-bg-card);
      box-shadow: var(--shadow-composer);
    }

    .composer:focus-within {
      border-color: rgba(54, 130, 254, 0.5);
      box-shadow: 0 2px 12px rgba(54, 130, 254, 0.10);
    }

    .composer-left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
      flex: 1;
    }

    .composer-label {
      flex: 0 0 auto;
      color: var(--color-text-main);
      font-size: 16px;
      font-weight: 600;
      line-height: 24px;
    }

    .composer-divider {
      flex: 0 0 auto;
      width: 1px;
      height: 24px;
      background: var(--color-border);
    }

    .composer-input {
      width: 100%;
      min-width: 0;
      padding: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--color-text-main);
      font-size: 16px;
      font-weight: 400;
      line-height: 24px;
    }

    .composer-input::placeholder {
      color: var(--color-text-placeholder);
      font-weight: 400;
    }

    .composer-action {
      position: relative;
      display: grid;
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 50%;
      background: var(--color-bg-soft);
      color: var(--color-text-secondary);
    }

    .composer-action.is-send {
      background: var(--color-primary);
      color: #FFFFFF;
    }

    .composer-action .send-icon,
    .composer-action.is-send .mic-icon {
      display: none;
    }

    .composer-action.is-send .send-icon {
      display: block;
    }

    .voice-hint,
    .voice-wave {
      display: none;
    }

    .composer.is-recording {
      border-color: rgba(54, 130, 254, 0.55);
      box-shadow: 0 2px 12px rgba(54, 130, 254, 0.12);
    }

    .composer.is-recording .composer-input {
      flex: 1 1 auto;
      width: 100%;
      color: var(--color-text-placeholder);
      text-overflow: ellipsis;
      -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 46%, rgba(0, 0, 0, 0.2) 70%, transparent 100%);
      mask-image: linear-gradient(90deg, #000 0%, #000 46%, rgba(0, 0, 0, 0.2) 70%, transparent 100%);
    }

    .composer.is-recording .composer-left {
      padding-right: 188px;
    }

    .composer.is-recording .voice-hint {
      display: inline-flex;
      flex: 0 0 auto;
      align-items: center;
      gap: 6px;
      color: var(--color-text-tertiary);
      font-size: 12px;
      font-weight: 400;
      line-height: 18px;
      margin-left: 18px;
      white-space: nowrap;
    }

    .voice-hint kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 20px;
      padding: 0 8px;
      border: 1px solid var(--color-border-light);
      border-radius: 6px;
      background: var(--color-bg-soft);
      color: var(--color-text-secondary);
      font-family: inherit;
      font-size: 12px;
      font-weight: 400;
      line-height: 18px;
    }

      width: 40px;
      height: 40px;

    .composer.is-recording .composer-action {
      position: absolute;
      right: 10px;
      top: 50%;
      background: transparent;
      color: #FFFFFF;
      box-shadow: none;
      z-index: 2;
      margin-left: 0;
      transform: translateY(-50%);
    }

    .composer.is-recording .composer-action .mic-icon,
    .composer.is-recording .composer-action .send-icon {
      display: none;
    }

    .composer.is-recording .voice-record-icon {
      display: none;
    }

    .workspace.is-placeholder-page .assistant-scene {
      display: none;
    }

    /* Context menu */
    .job-context-menu {
      position: fixed;
      z-index: 60;
      left: 0;
      top: 0;
      display: none;
      width: 194px;
      height: 128px;
      padding: 8px;
      border-radius: var(--radius-lg);
      background: var(--color-bg-card);
      box-shadow: var(--shadow-menu);
    }

    .page-shell.is-menu-open .job-context-menu {
      display: block;
    }

    .context-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .context-item {
      width: 100%;
      height: 34px;
      padding: 10px;
      border-radius: 6px;
      color: var(--color-text-main);
      font-family: "PingFang SC", "PingFang HK", var(--font-main);
      font-size: 14px;
      font-weight: 400;
      line-height: 16px;
      text-align: left;
    }

    .context-item:hover,
    .context-item.is-hovered {
      background: var(--color-bg-hover);
    }

    /* Hidden state references: loading / empty / error are kept out of the default visual frame. */
    .state-reference {
      position: absolute;
      left: 290px;
      top: 590px;
      display: none;
      width: 990px;
      min-height: 48px;
      padding: 12px 20px;
      border: 1px dashed var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-bg-soft);
      color: var(--color-text-secondary);
    }

    .state-reference.is-visible {
      display: block;
    }

    /* Responsive */
    @media (min-width: 1281px) and (max-height: 760px) {
      .workspace {
        min-height: 0;
      }

      .assistant-scene {
        top: clamp(132px, 20vh, 168px);
      }
    }

    @media (max-width: 1280px) {
      html,
      body {
        overflow: hidden;
      }

      .page-shell {
        display: block;
        height: 100vh;
        min-height: 0;
        overflow: hidden;
      }

      .page-shell.is-sidebar-collapsed {
        --sidebar-width: 280px;
      }

      .page-shell.is-sidebar-collapsed .nav-item span:last-child,
      .page-shell.is-sidebar-collapsed .job-section,
      .page-shell.is-sidebar-collapsed .settings {
        display: initial;
      }

      .page-shell.is-sidebar-collapsed .sidebar {
        transform: translateX(-100%);
      }

      .sidebar {
        position: fixed;
        z-index: 20;
        left: 0;
        top: 0;
        width: 280px;
        max-width: calc(100vw - 64px);
        min-height: auto;
        height: 100vh;
        overflow: hidden;
        padding: 26px 12px 8px;
        box-shadow: 18px 0 36px rgba(0, 0, 0, 0.08);
      }

      .mobile-sidebar-mask {
        position: fixed;
        inset: 0;
        z-index: 19;
        display: block;
        background: rgba(0, 0, 0, 0.12);
      }

      .page-shell.is-sidebar-collapsed .mobile-sidebar-mask {
        display: none;
      }

      .mobile-menu-button {
        position: fixed;
        z-index: 18;
        left: 16px;
        top: 16px;
        display: none;
        width: 40px;
        height: 40px;
        place-items: center;
        border: 1px solid var(--color-border-light);
        border-radius: 10px;
        background: var(--color-bg-card);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      .mobile-menu-button .figma-icon {
        width: 18px;
        height: 18px;
      }

      .page-shell.is-sidebar-collapsed .mobile-menu-button {
        display: grid;
      }

      .brand {
        margin: 0 0 20px 8px;
      }

      .nav-list {
        flex-direction: column;
        overflow: visible;
        gap: 1px;
        padding-bottom: 0;
      }

      .nav-list li:first-child {
        margin-bottom: 0;
      }

      .nav-item {
        width: 256px !important;
        min-width: 0;
        padding-right: 10px;
      }

      .job-section {
        margin-top: 22px;
      }

      .job-section.is-focused::before {
        display: block;
      }

      .job-header {
        width: 256px;
      }

      .job-search-input {
        width: 256px;
      }

      .job-list-wrap {
        flex: 0 0 auto;
        height: calc(100vh - 425px);
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
        padding-right: 9px;
      }

      .job-section.is-search-open .job-list-wrap {
        height: calc(100vh - 463px);
      }

      .job-scrollbar-control {
        top: 39px;
      }

      .job-list {
        flex-direction: column;
        width: 256px;
        padding-left: 10px;
      }

      .job-row {
        width: 256px;
      }

      .more-button {
        right: 8px;
      }

      .settings {
        display: block;
      }

      .workspace {
        height: calc(100vh - 16px);
        min-height: 0;
        margin: 8px;
        overflow: hidden;
      }

      .assistant-scene {
        position: absolute;
        left: calc(50% + var(--assistant-desktop-x-offset));
        top: clamp(180px, calc(50vh - 229px + var(--assistant-desktop-y-offset)), 360px);
        inset: auto;
        width: min(770px, calc(100% - 48px));
        height: 458px;
        padding: 0;
        overflow: hidden;
        transform: translateX(-50%);
      }

      .page-shell.is-sidebar-collapsed .assistant-scene {
        left: calc(50% + var(--assistant-desktop-x-offset));
      }

      .profile {
        position: absolute;
        left: 0;
        top: 0;
        grid-template-columns: 149px auto;
        justify-content: start;
        width: max-content;
        max-width: 100%;
        height: 144px;
        margin: 0;
      }

      .avatar {
        transform: none;
        transform-origin: left top;
      }

      .profile-copy {
        margin-top: 55px;
      }

      .prompt,
      .prompt-divider,
      .suggestions,
      .composer {
        position: absolute;
      }

      .prompt {
        left: 24px;
        right: auto;
        top: 156px;
        width: calc(100% - 48px);
        margin: 0;
        font-size: 24px;
        line-height: 40px;
        text-align: left;
        overflow-wrap: normal;
      }

      .prompt-divider {
        left: 24px;
        right: auto;
        top: 256px;
        width: calc(100% - 48px);
        margin: 0;
      }

      .suggestions {
        left: 24px;
        right: auto;
        top: 278px;
        width: calc(100% - 48px);
        margin: 0;
      }

      .suggestions-label {
        margin-bottom: 10px;
        text-align: left;
      }

      .suggestion-list {
        justify-content: flex-start;
      }

      .composer {
        left: 0;
        right: auto;
        top: 398px;
        bottom: auto;
        width: 100%;
        margin-top: 0;
      }

    }

    @media (max-width: 520px) {
      .workspace {
        margin: 6px;
        height: calc(100vh - 12px);
        border-radius: var(--radius-lg);
      }

      .mobile-menu-button {
        left: 14px;
        top: 14px;
      }

      .assistant-scene {
        padding: 76px 20px 104px;
      }

      .profile {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: min(260px, 100%);

      }

      .avatar {
        transform: scale(0.58);
        transform-origin: center top;
      }

      .profile-copy {
        margin-top: -52px;
        text-align: center;
      }

      .profile-name {
        font-size: 18px;
        line-height: 26px;
      }

        font-size: 13px;
        line-height: 20px;
      }

      .prompt {
        margin: 20px auto 0;
        width: min(100%, 300px);

        margin-top: 14px;

      .suggestions-label {

      }

      .suggestion-list {
        justify-content: flex-start;
      }

      .suggestions-label,
      .suggestion-chip {
        font-size: 12px;
        line-height: 18px;

            <li class="job-row"><button class="job-button" type="button">Global Community Manager</button><button class="more-button" type="button" aria-label="More actions"><span class="figma-icon icon-more" aria-hidden="true"></span></button></li>
            <li class="job-row"><button class="job-button" type="button">Sales Executive, HR Sales</button><button class="more-button" type="button" aria-label="More actions"><span class="figma-icon icon-more" aria-hidden="true"></span></button></li>

    <!-- 主内容区 -->
    <main class="workspace">
      <button class="mobile-menu-button" id="mobileMenuButton" type="button" aria-label="Open sidebar">

      <!-- AI 招聘助手 -->
      <section class="assistant-scene" aria-label="AI Recruiter">

          <div class="avatar" aria-hidden="true">

            <h1 class="profile-name">Viona</h1>
            <p class="profile-role">AI Recruiter</p>

        </div>

        <div class="prompt">
          <p>I'm ready to get this search started. To begin, what is the <strong>job title</strong> for the role we're hiring for?</p>
        </div>
        <div class="prompt-divider" aria-hidden="true"></div>

        <div class="suggestions" aria-label="Example job titles">
          <p class="suggestions-label">Try asking:</p>
          <div class="suggestion-list">
            <button class="suggestion-chip" type="button" data-suggestion="Software Engineer">Software Engineer</button>
            <button class="suggestion-chip" type="button" data-suggestion="Sales Manager">Sales Manager</button>
          </div>
        </div>

        <!-- 输入区域 -->
        <div class="composer">
          <div class="composer-left">
            <label class="composer-label" for="jobTitleInput">Job Title</label>
            <span class="composer-divider" aria-hidden="true"></span>
            <input
              id="jobTitleInput"
              class="composer-input"
              type="text"
              autocomplete="off"
              placeholder="Enter the offical job title of the role only"
            />
            <span class="voice-hint" aria-hidden="true">
              <span>Press and hold</span>
              <kbd>Ctrl</kbd>
              <span>to speak</span>
            </span>
            <span class="voice-wave" aria-hidden="true"></span>
          </div>
          <button class="composer-action" id="composerAction" type="button" aria-label="Record">
            <span class="figma-icon mic-icon icon-mic" aria-hidden="true"></span>
            <span class="figma-icon send-icon icon-send" aria-hidden="true"></span>
            <span class="voice-record-icon" aria-hidden="true"></span>
          </button>
        </div>

        <!-- 空 / 加载 / 错误状态保留为隐藏参考，不出现在默认视觉稿中 -->
        <div class="state-reference" id="stateReference"></div>
      </section>

      <!-- 更多菜单，对应第 3 张交互状态 -->
      <div class="job-context-menu" id="contextMenu">
        <ul class="context-list">
          <li><button class="context-item" type="button">置顶</button></li>
          <li><button class="context-item" type="button">重命名</button></li>
          <li><button class="context-item is-hovered" type="button">删除</button></li>
        </ul>
      </div>

  <script>
    const revealPageAfterFonts = window.__revealPersevioPage || (() => {
      document.documentElement.classList.remove('fonts-loading');
      document.documentElement.classList.add('fonts-ready');
    });

    if (document.fonts && document.fonts.ready) {
      Promise.race([
        document.fonts.ready,
        new Promise((resolve) => setTimeout(resolve, 900))
      ]).then(revealPageAfterFonts);
    } else {
      revealPageAfterFonts();
    }

    const pageShell = document.getElementById('pageShell');
    const jobSection = document.getElementById('jobSection');
    const salesRow = document.getElementById('salesRow');
    const input = document.getElementById('jobTitleInput');
    const composer = document.querySelector('.composer');
    const composerAction = document.getElementById('composerAction');
    const stateReference = document.getElementById('stateReference');
    const workspace = document.querySelector('.workspace');
    const collapseButton = document.querySelector('.collapse-button');
    const railOpenButton = document.getElementById('railOpenButton');
    const railNavButtons = Array.from(document.querySelectorAll('[data-rail-page]'));
    const navItems = Array.from(document.querySelectorAll('.nav-list .nav-item'));
    const jobHeader = document.querySelector('.job-header');
    const mobileMenuButton = document.getElementById('mobileMenuButton');
    const mobileSidebarMask = document.getElementById('mobileSidebarMask');
    const jobListWrap = document.querySelector('.job-list-wrap');
    const jobRows = Array.from(document.querySelectorAll('.job-row'));
    const jobSearchButton = document.getElementById('jobSearchButton');
    const jobSearchInput = document.getElementById('jobSearchInput');
    const suggestionChips = Array.from(document.querySelectorAll('.suggestion-chip'));
    const jobScrollbar = document.getElementById('jobScrollbar');
    const jobScrollbarThumb = document.getElementById('jobScrollbarThumb');
    const contextMenu = document.getElementById('contextMenu');
    const compactSidebarQuery = window.matchMedia('(max-width: 1280px)');
    const reduceMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    const promptText = document.querySelector('.prompt p');

    function animatePromptTypewriter() {
      if (!promptText || reduceMotionQuery.matches) return;

      const sourceNodes = Array.from(promptText.childNodes);
      const animatedChars = [];

      function buildAnimatedNode(node) {
        if (node.nodeType === Node.TEXT_NODE) {
          const fragment = document.createDocumentFragment();
          Array.from(node.textContent).forEach((character) => {
            const span = document.createElement('span');
            span.className = 'typewriter-char';
            span.textContent = character;
            animatedChars.push(span);
            fragment.appendChild(span);
          });
          return fragment;
        }

        if (node.nodeType === Node.ELEMENT_NODE) {
          const clone = node.cloneNode(false);
          Array.from(node.childNodes).forEach((child) => {
            clone.appendChild(buildAnimatedNode(child));
          });
          return clone;
        }

        return node.cloneNode(true);
      }

      promptText.replaceChildren();
      sourceNodes.forEach((node) => {
        promptText.appendChild(buildAnimatedNode(node));
      });

      const caret = document.createElement('span');
      caret.className = 'typewriter-caret';
      caret.setAttribute('aria-hidden', 'true');
      if (animatedChars.length > 0) {
        animatedChars[0].parentNode.insertBefore(caret, animatedChars[0]);
      } else {
        promptText.appendChild(caret);
      }
      promptText.classList.add('is-typing');

      let index = 0;

      function revealNextCharacter() {
        if (index >= animatedChars.length) {
          window.setTimeout(() => {
            promptText.classList.remove('is-typing');
          }, 520);
          return;
        }

        const currentChar = animatedChars[index];
        currentChar.classList.add('is-visible');
        currentChar.after(caret);
        index += 1;
        const nextDelay = currentChar.textContent === ' ' ? 12 : 26;
        window.setTimeout(revealNextCharacter, nextDelay);
      }

      window.setTimeout(revealNextCharacter, 280);
    }

    function syncFilledState() {
      const filled = input.value.trim().length > 0;
      if (filled) {
        composer.classList.remove('is-recording');
      }
      composerAction.classList.toggle('is-send', filled);
      pageShell.classList.toggle('is-filled', filled && !pageShell.classList.contains('is-menu-open'));
      composerAction.setAttribute('aria-label', filled ? 'Send' : (composer.classList.contains('is-recording') ? 'Stop recording preview' : 'Record'));
    }

    function toggleRecordingPreview() {
      if (input.value.trim()) return;
      composer.classList.toggle('is-recording');
      composerAction.setAttribute('aria-label', composer.classList.contains('is-recording') ? 'Stop recording preview' : 'Record');
    }

    function toggleJobSearch(event) {
      event?.stopPropagation();
      const nextOpen = !jobSection.classList.contains('is-search-open');
      jobSection.classList.toggle('is-search-open', nextOpen);
      jobSearchButton.setAttribute('aria-expanded', nextOpen ? 'true' : 'false');
      window.requestAnimationFrame(updateJobScrollbar);
      if (nextOpen) {
        jobSearchInput.focus();
      }
    }

    function syncRailActive(page) {
      railNavButtons.forEach((button) => {
        button.classList.toggle('is-rail-active', button.dataset.railPage === page);
      });
    }

    function selectJobRow(row) {
      jobSection.classList.remove('is-job-selected');
      jobRows.forEach((item) => {
        const selected = item === row;
        item.classList.toggle('is-selected', selected);
        item.setAttribute('aria-selected', selected ? 'true' : 'false');
      });
      jobSection.classList.toggle('is-focused', Boolean(row));
      if (row) {
        navItems.forEach((navItem) => navItem.classList.remove('is-active', 'is-muted-active'));
        syncRailActive(null);
        workspace.classList.add('is-placeholder-page');
      }
    }

    function selectJobHeader() {
      jobRows.forEach((item) => {
        item.classList.remove('is-selected');
        item.setAttribute('aria-selected', 'false');
      });
      jobSection.classList.add('is-focused', 'is-job-selected');
      navItems.forEach((navItem) => navItem.classList.remove('is-active', 'is-muted-active'));
      syncRailActive(null);
      workspace.classList.add('is-placeholder-page');
      closeMenu();
    }

    function selectNavItem(item) {
      navItems.forEach((navItem) => navItem.classList.remove('is-active', 'is-muted-active'));
      selectJobRow(null);
      jobSection.classList.remove('is-job-selected');
      syncRailActive(item.dataset.page);
      const isPublishPage = item.dataset.page === 'publish';
      workspace.classList.toggle('is-placeholder-page', !isPublishPage);
      if (isPublishPage) {
        item.classList.add('is-active');
        closeMenu();
      } else {
        item.classList.add('is-muted-active');
        closeMenu();
      }
    }

    function positionContextMenu(row) {
      if (!row) return;

      const trigger = row.querySelector('.more-button');
      if (!trigger) return;

      const triggerRect = trigger.getBoundingClientRect();
      const menuWidth = contextMenu.offsetWidth || 194;
      const menuHeight = contextMenu.offsetHeight || 128;
      const gap = 4;
      const viewportPadding = 8;
      const topBelow = triggerRect.bottom + gap;
      const topAbove = triggerRect.top - menuHeight - gap;
      const maxLeft = window.innerWidth - menuWidth - viewportPadding;
      const maxTop = window.innerHeight - menuHeight - viewportPadding;
      const hasRoomBelow = topBelow + menuHeight <= window.innerHeight - viewportPadding;
      const nextTop = hasRoomBelow ? topBelow : topAbove;
      const nextLeft = triggerRect.left;

      contextMenu.style.left = `${Math.max(viewportPadding, Math.min(maxLeft, nextLeft))}px`;
      contextMenu.style.top = `${Math.max(viewportPadding, Math.min(maxTop, nextTop))}px`;
    }

    function openMenu(row = salesRow) {
      pageShell.classList.add('is-menu-open');
      selectJobRow(row);
      positionContextMenu(row);
      syncFilledState();
    }

    function closeMenu() {
      pageShell.classList.remove('is-menu-open');
      syncFilledState();
    }

    function collapseSidebar() {
      pageShell.classList.add('is-sidebar-collapsed');
    }

    function openSidebar() {
      pageShell.classList.remove('is-sidebar-collapsed');
      window.requestAnimationFrame(updateJobScrollbar);
    }

    function syncSidebarForViewport() {
      if (compactSidebarQuery.matches) {
        collapseSidebar();
      } else {
        pageShell.classList.remove('is-sidebar-collapsed');
      }
      window.requestAnimationFrame(updateJobScrollbar);
    }

    function updateJobScrollbar() {
      const scrollable = jobListWrap.scrollHeight > jobListWrap.clientHeight + 1;
      jobSection.classList.toggle('has-scroll', scrollable);

      if (!scrollable) return;

      jobScrollbar.style.height = `${jobListWrap.clientHeight}px`;
      const trackHeight = jobListWrap.clientHeight;
      const thumbHeight = Math.max(44, Math.round((jobListWrap.clientHeight / jobListWrap.scrollHeight) * trackHeight));
      const maxThumbTop = trackHeight - thumbHeight;
      const maxScrollTop = jobListWrap.scrollHeight - jobListWrap.clientHeight;
      const thumbTop = maxScrollTop === 0 ? 0 : Math.round((jobListWrap.scrollTop / maxScrollTop) * maxThumbTop);

      jobScrollbarThumb.style.height = `${thumbHeight}px`;
      jobScrollbarThumb.style.transform = `translateY(${thumbTop}px)`;
    }

    input.addEventListener('input', syncFilledState);

    suggestionChips.forEach((chip) => {
      chip.addEventListener('click', () => {
        input.value = chip.dataset.suggestion || chip.textContent.trim();
        syncFilledState();
        input.focus();
      });
    });

    jobRows.forEach((row) => {
      row.setAttribute('aria-selected', 'false');
      row.querySelector('.job-button')?.addEventListener('click', () => {
        selectJobRow(row);
        closeMenu();
      });
    });

    navItems.forEach((item) => {
      item.addEventListener('click', () => selectNavItem(item));
    });

    railNavButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const target = navItems.find((item) => item.dataset.page === button.dataset.railPage);
        if (target) selectNavItem(target);
      });
    });

    jobHeader.addEventListener('click', selectJobHeader);
    jobSearchButton.addEventListener('click', toggleJobSearch);

    composerAction.addEventListener('click', () => {
      if (!input.value.trim()) {
        toggleRecordingPreview();
        return;
      }

      input.focus();
    });

    jobListWrap.addEventListener('click', (event) => {
      const more = event.target.closest('.more-button');
      if (!more) return;
      event.stopPropagation();
      const row = more.closest('.job-row');
      if (!row) return;
      const alreadyOpenForRow = pageShell.classList.contains('is-menu-open') && row.classList.contains('is-selected');
      if (alreadyOpenForRow) {
        closeMenu();
      } else {
        openMenu(row);
      }
    });

    collapseButton.addEventListener('click', () => {
      pageShell.classList.toggle('is-sidebar-collapsed');
    });

    railOpenButton.addEventListener('click', openSidebar);
    mobileMenuButton.addEventListener('click', openSidebar);
    mobileSidebarMask.addEventListener('click', collapseSidebar);
    jobListWrap.addEventListener('scroll', () => {
      updateJobScrollbar();
      const selectedRow = document.querySelector('.job-row.is-selected');
      if (pageShell.classList.contains('is-menu-open')) {
        positionContextMenu(selectedRow);
      }
    });
    window.addEventListener('resize', () => {
      updateJobScrollbar();
      const selectedRow = document.querySelector('.job-row.is-selected');
      if (pageShell.classList.contains('is-menu-open')) {
        positionContextMenu(selectedRow);
      }
    });

    jobScrollbarThumb.addEventListener('pointerdown', (event) => {
      event.preventDefault();
      const startY = event.clientY;
      const startScrollTop = jobListWrap.scrollTop;
      const trackHeight = jobScrollbar.clientHeight;
      const thumbHeight = jobScrollbarThumb.offsetHeight;
      const maxThumbTop = trackHeight - thumbHeight;
      const maxScrollTop = jobListWrap.scrollHeight - jobListWrap.clientHeight;

      function onPointerMove(moveEvent) {
        const deltaY = moveEvent.clientY - startY;
        const nextScrollTop = startScrollTop + (deltaY / maxThumbTop) * maxScrollTop;
        jobListWrap.scrollTop = Math.max(0, Math.min(maxScrollTop, nextScrollTop));
      }

      function onPointerUp() {
        window.removeEventListener('pointermove', onPointerMove);
        window.removeEventListener('pointerup', onPointerUp);
      }

      window.addEventListener('pointermove', onPointerMove);
      window.addEventListener('pointerup', onPointerUp);
    });

    document.addEventListener('click', (event) => {
      if (!event.target.closest('#contextMenu') && !event.target.closest('.more-button')) {
        closeMenu();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeMenu();
        if (compactSidebarQuery.matches) {
          collapseSidebar();
        }
        stateReference.classList.remove('is-visible');
      }
    });

    compactSidebarQuery.addEventListener('change', syncSidebarForViewport);
    syncSidebarForViewport();

    updateJobScrollbar();
    syncRailActive(null);
    animatePromptTypewriter();

    const initialState = new URLSearchParams(window.location.search).get('state');
    if (initialState === 'filled') {
      input.value = 'IT Manager';
      syncFilledState();
    }
    if (initialState === 'recording') {
      composer.classList.add('is-recording');
      syncFilledState();
    }
    if (initialState === 'selected') {
      selectJobRow(salesRow);
    }
    if (initialState === 'nav-selected') {
      selectNavItem(navItems[1]);
    }
    if (initialState === 'menu') {
      openMenu();
    }
  </script>
